<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prism code editor builder</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <h2>Follow instructions in README.md to create your bundle</h2>
    <div id="editor"></div>

    <script type="module">
      const editor = createEditor('#editor', {
        language: 'brindille',
        value: 'const a = "lol";' + '\n\n',
        insertSpaces: false,
      });
    </script>
    <style type="text/css">
      .prism-code-editor {
        height: 30em;
      }
    </style>
  </body>
</html>
